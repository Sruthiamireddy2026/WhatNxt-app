<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>What Nxt — Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #F7F8FA; color: #1A1A2E; min-height: 100vh; }
    .header { background: #FF6B35; padding: 24px 20px 20px; text-align: center; box-shadow: 0 2px 8px rgba(255,107,53,0.25); position: relative; }
    .header h1 { font-size: 2.2rem; font-weight: 800; color: #FFFFFF; letter-spacing: -0.5px; line-height: 1; }
    .header .tagline { margin-top: 6px; font-size: 0.85rem; font-weight: 500; color: rgba(255,255,255,0.85); letter-spacing: 0.6px; text-transform: uppercase; }
    .header .sub-tagline { margin-top: 3px; font-size: 0.78rem; color: rgba(255,255,255,0.7); font-style: italic; }
    .demo-banner { background: rgba(255,255,255,0.15); border-radius: 10px; padding: 8px 16px; margin: 12px auto 0; max-width: 400px; font-size: 0.78rem; color: rgba(255,255,255,0.85); }
    .container { max-width: 680px; margin: 0 auto; padding: 20px 16px 40px; display: flex; flex-direction: column; gap: 20px; }
    .section { border-radius: 14px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
    .section-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; font-weight: 700; font-size: 0.82rem; letter-spacing: 0.8px; text-transform: uppercase; color: #FFFFFF; }
    .section-header .label { display: flex; align-items: center; gap: 7px; }
    .done-count { font-size: 0.72rem; font-weight: 600; background: rgba(255,255,255,0.25); padding: 2px 8px; border-radius: 20px; white-space: nowrap; opacity: 0; transition: opacity 0.2s; }
    .done-count.visible { opacity: 1; }
    .section--now   .section-header { background: #E63946; }
    .section--today .section-header { background: #F4A022; }
    .section--wait  .section-header { background: #2A9D5C; }
    .section--now   .card { border-left: 4px solid #E63946; }
    .section--today .card { border-left: 4px solid #F4A022; }
    .section--wait  .card { border-left: 4px solid #2A9D5C; }
    .card { background: #FFFFFF; padding: 14px 14px 14px 16px; display: flex; align-items: center; gap: 12px; transition: background 0.25s, opacity 0.25s; }
    .card + .card { border-top: 1px solid #F0F0F0; }
    .card-content { flex: 1; min-width: 0; }
    .card-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; }
    .sender { font-weight: 700; font-size: 0.88rem; color: #1A1A2E; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: color 0.25s; }
    .tag { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.4px; padding: 2px 7px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
    .tag--email { background: #E8F4FD; color: #1A6FA3; }
    .tag--text  { background: #FFF0F3; color: #C0392B; }
    .tag--slack { background: #F0E6FF; color: #6B21A8; }
    .timestamp { font-size: 0.70rem; color: #AAAAAA; font-weight: 400; flex-shrink: 0; }
    .subject { font-weight: 600; font-size: 0.84rem; color: #2D2D3A; margin-bottom: 2px; transition: color 0.25s; }
    .preview { font-size: 0.78rem; color: #7A7A8C; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: color 0.25s; }
    .card.done { background: #F5F5F5; opacity: 0.72; }
    .card.done .sender, .card.done .subject { text-decoration: line-through; color: #AAAAAA; }
    .card.done .preview { color: #BBBBBB; }
    .btn-done { flex-shrink: 0; padding: 6px 12px; font-size: 0.75rem; font-weight: 700; border: none; border-radius: 20px; cursor: pointer; transition: background 0.2s, transform 0.1s; white-space: nowrap; }
    .btn-done:active { transform: scale(0.95); }
    .btn-done.state-done { background: #2A9D5C; color: #FFFFFF; }
    .btn-done.state-done:hover { background: #228B4F; }
    .btn-done.state-undo { background: #D0D0D0; color: #555555; }
    .btn-done.state-undo:hover { background: #BBBBBB; }
    .btn-rules { position: absolute; top: 16px; right: 16px; padding: 6px 13px; font-size: 0.88rem; font-weight: 700; background: rgba(255,255,255,0.18); border: 1.5px solid rgba(255,255,255,0.55); border-radius: 20px; color: #fff; cursor: pointer; white-space: nowrap; }
    .btn-rules:hover { background: rgba(255,255,255,0.32); }
    .rules-overlay { position: fixed; inset: 0; background: rgba(26,26,46,0.42); z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
    .rules-overlay.open { opacity: 1; pointer-events: all; }
    .rules-panel { position: fixed; top: 0; right: 0; height: 100%; width: min(400px, 100vw); background: #fff; box-shadow: -6px 0 28px rgba(0,0,0,0.14); z-index: 201; transform: translateX(100%); transition: transform 0.28s cubic-bezier(0.4,0,0.2,1); display: flex; flex-direction: column; }
    .rules-panel.open { transform: translateX(0); }
    .rules-panel-head { background: #FF6B35; padding: 18px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .rules-panel-head h2 { color: #fff; font-size: 1.05rem; font-weight: 800; margin: 0; }
    .btn-panel-close { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.2); border: none; border-radius: 50%; color: #fff; font-size: 1rem; cursor: pointer; }
    .rules-panel-body { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
    .rules-hint { font-size: 0.80rem; color: #7A7A8C; line-height: 1.55; margin: 0; }
    .rules-textarea { width: 100%; min-height: 210px; padding: 12px 14px; font-size: 0.84rem; font-family: inherit; color: #1A1A2E; border: 1.5px solid #E0E0EC; border-radius: 10px; resize: vertical; line-height: 1.65; outline: none; }
    .rules-textarea:focus { border-color: #FF6B35; }
    .rules-panel-foot { padding: 14px 20px; border-top: 1px solid #F0F0F0; display: flex; flex-direction: column; gap: 10px; flex-shrink: 0; }
    .rules-foot-btns { display: flex; gap: 10px; }
    .btn-save-rules { flex: 1; padding: 10px 0; background: #2A9D5C; color: #fff; border: none; border-radius: 20px; font-size: 0.84rem; font-weight: 700; cursor: pointer; }
    .btn-save-rules:hover { background: #228B4F; }
    .btn-cancel-rules { padding: 10px 18px; background: #F0F0F4; color: #555; border: none; border-radius: 20px; font-size: 0.84rem; font-weight: 600; cursor: pointer; }
    .rules-saved-msg { font-size: 0.80rem; font-weight: 600; color: #2A9D5C; text-align: center; min-height: 1.2em; }
    @media (max-width: 420px) { .header h1 { font-size: 1.8rem; } .card { padding: 12px 10px 12px 14px; gap: 8px; } .btn-done { padding: 5px 10px; font-size: 0.70rem; } }
  </style>
</head>
<body>

  <header class="header">
    <h1>What Nxt</h1>
    <p class="tagline">Noise vs Signal</p>
    <p class="sub-tagline">You Decide What Matters</p>
    <p class="demo-banner">✨ Interactive Demo — try the Done buttons + ⚙️ My RRules!</p>
    <button class="btn-rules" id="btn-rules" onclick="openRulesPanel()">⚙️ My RRules</button>
  </header>

  <main class="container" id="dashboard"></main>

  <div class="rules-overlay" id="rules-overlay" onclick="closeRulesPanel()"></div>
  <div class="rules-panel" id="rules-panel" role="dialog" aria-label="Your Priority Rules">
    <div class="rules-panel-head">
      <h2>Your Priority Rules</h2>
      <button class="btn-panel-close" onclick="closeRulesPanel()">✕</button>
    </div>
    <div class="rules-panel-body">
      <p class="rules-hint">Write one rule per line in plain English. Your rules override the built-in priority logic.</p>
      <textarea class="rules-textarea" id="rules-textarea"
        placeholder="Anything from my kid's school = always DO NOW&#10;Kohl's 30% off = DO TODAY&#10;HOA emails = always CAN WAIT"></textarea>
    </div>
    <div class="rules-panel-foot">
      <div class="rules-foot-btns">
        <button class="btn-save-rules" onclick="saveRules()">Save Rules</button>
        <button class="btn-cancel-rules" onclick="closeRulesPanel()">Close</button>
      </div>
      <div class="rules-saved-msg" id="rules-saved-msg"></div>
    </div>
  </div>

  <script>
    /* ── DEMO DATA ─────────────────────────── */
    const DEMO_MESSAGES = [
      { id:1, type:"text",  sender:"Lincoln Elementary — Nurse Rivera", subject:"URGENT: Jake has a fever of 101.4 — please call now", preview:"Hi, this is Nurse Rivera. Jake came to my office at 10:15 AM with a fever. He needs to be picked up.", timestamp:"10:17 AM", priority:"do-now" },
      { id:2, type:"email", sender:"Dr. Sarah Kim — Pediatrics",         subject:"Appointment reminder: TODAY at 2:00 PM",              preview:"This is a reminder that Emma has a well-child visit scheduled for today at 2:00 PM. Please call if you need to reschedule.", timestamp:"8:02 AM",  priority:"do-now" },
      { id:3, type:"text",  sender:"Coach Rivera — Lightning Soccer",    subject:"Practice moved to 4 PM Friday (not 3 PM)",            preview:"Hey team parents! Due to field maintenance, Friday's practice is now at 4 PM. Same location.", timestamp:"9:45 AM",  priority:"do-today" },
      { id:4, type:"email", sender:"Kohl's Rewards",                     subject:"30% off TODAY ONLY — your saved items are waiting",   preview:"You left some great things in your cart! Today only: use code MOM30 for 30% off your entire purchase.", timestamp:"7:30 AM",  priority:"do-today" },
      { id:5, type:"text",  sender:"Mark (Husband)",                     subject:"Dinner tonight — are we cooking or ordering?",        preview:"Hey babe, should I pick something up on my way home or are you making that pasta?", timestamp:"11:03 AM", priority:"do-today" },
      { id:6, type:"email", sender:"Maplewood HOA",                      subject:"Spring Newsletter — pool opening, lawn care tips",   preview:"The pool opens May 15! Inside: lawn care schedule, the spring potluck on June 7, and neighborhood updates.", timestamp:"6:00 AM",  priority:"can-wait" },
      { id:7, type:"email", sender:"Amazon",                             subject:"Your order has shipped — arriving Thursday",          preview:"Great news! Your order (#114-9823041) is on its way. Estimated delivery: Thursday by 8 PM.", timestamp:"5:48 AM",  priority:"can-wait" },
      { id:8, type:"email", sender:"Lincoln Elementary PTA",             subject:"PTA meeting this Thursday at 6:30 PM — agenda inside",preview:"Join us Thursday evening in the school library. We'll be discussing the spring carnival, budget updates.", timestamp:"7:15 AM",  priority:"can-wait" },
      { id:9, type:"email", sender:"Khan Academy",                       subject:"Emma is on a 7-day streak — keep it going!",          preview:"Way to go! Emma has practiced math 7 days in a row. Explore new courses in science and reading.", timestamp:"9:00 AM",  priority:"can-wait" },
      { id:10,type:"email", sender:"Mrs. Patel — Room 12",               subject:"Book Fair fundraiser — 42% of goal reached, thank you!",preview:"Thanks to your generous support, we've raised $1,260 of our $3,000 goal! The fair runs through Friday.", timestamp:"8:55 AM",  priority:"can-wait" },
    ];

    const BUCKETS = [
      { key:"do-now",   id:"now",   emoji:"🔴", label:"Do Now"   },
      { key:"do-today", id:"today", emoji:"🟡", label:"Do Today" },
      { key:"can-wait", id:"wait",  emoji:"🟢", label:"Can Wait" }
    ];

    /* ── RULES PANEL ───────────────────────── */
    let customRules = localStorage.getItem('whatnxt_rules') || '';

    function openRulesPanel() {
      document.getElementById('rules-textarea').value = customRules;
      document.getElementById('rules-saved-msg').textContent = '';
      document.getElementById('rules-panel').classList.add('open');
      document.getElementById('rules-overlay').classList.add('open');
    }
    function closeRulesPanel() {
      document.getElementById('rules-panel').classList.remove('open');
      document.getElementById('rules-overlay').classList.remove('open');
    }
    function saveRules() {
      customRules = document.getElementById('rules-textarea').value.trim();
      localStorage.setItem('whatnxt_rules', customRules);
      const msg = document.getElementById('rules-saved-msg');
      msg.textContent = '✅ Rules saved!';
      setTimeout(() => { closeRulesPanel(); msg.textContent = ''; }, 1200);
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeRulesPanel(); });

    /* ── BUILD UI ──────────────────────────── */
    function buildSection({ id, emoji, label, messages }) {
      const section = document.createElement("section");
      section.className = `section section--${id}`;
      section.dataset.id = id;
      const header = document.createElement("div");
      header.className = "section-header";
      header.innerHTML = `<span class="label"><span>${emoji}</span><span>${label}</span></span><span class="done-count" id="count-${id}"></span>`;
      section.appendChild(header);
      messages.forEach((msg, index) => {
        const card = document.createElement("div");
        card.className = "card";
        card.dataset.section = id;
        card.dataset.index = index;
        const safe = str => String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
        const typeLabel = msg.type.charAt(0).toUpperCase() + msg.type.slice(1);
        card.innerHTML = `
          <div class="card-content">
            <div class="card-meta">
              <span class="sender">${safe(msg.sender)}</span>
              <span class="tag tag--${safe(msg.type)}">${safe(typeLabel)}</span>
              <span class="timestamp">${safe(msg.timestamp)}</span>
            </div>
            <div class="subject">${safe(msg.subject)}</div>
            <div class="preview">${safe(msg.preview)}</div>
          </div>
          <button class="btn-done state-done" onclick="toggleDone(this)">✅ Done</button>`;
        section.appendChild(card);
      });
      document.getElementById("dashboard").appendChild(section);
    }

    function toggleDone(btn) {
      const card = btn.closest(".card");
      const sectionId = card.dataset.section;
      const isDone = card.classList.toggle("done");
      if (isDone) { btn.textContent = "↩ Undo"; btn.classList.replace("state-done","state-undo"); }
      else        { btn.textContent = "✅ Done"; btn.classList.replace("state-undo","state-done"); }
      const section = document.querySelector(`.section--${sectionId}`);
      const total = section.querySelectorAll(".card.done").length;
      const badge = document.getElementById(`count-${sectionId}`);
      badge.textContent = `${total} item${total !== 1 ? "s" : ""} done`;
      badge.classList.toggle("visible", total > 0);
    }

    /* ── INIT ──────────────────────────────── */
    const grouped = {};
    DEMO_MESSAGES.forEach(msg => {
      if (!grouped[msg.priority]) grouped[msg.priority] = [];
      grouped[msg.priority].push(msg);
    });
    BUCKETS.forEach(bucket => buildSection({ id: bucket.id, emoji: bucket.emoji, label: bucket.label, messages: grouped[bucket.key] || [] }));
  </script>
</body>
</html>
