<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>What Nxt</title>

  <!-- ─────────────────────────────────────────────
       GLOBAL STYLES
       Defines the color palette, typography, card
       shadows, and mobile-first layout used throughout.
  ───────────────────────────────────────────────── -->
  <style>
    /* ---------- Reset & base ---------- */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #F7F8FA;
      color: #1A1A2E;
      min-height: 100vh;
    }

    /* ---------- Header ---------- */
    /* Full-width orange banner with the app name and tagline */
    .header {
      background: #FF6B35;
      padding: 24px 20px 20px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(255,107,53,0.25);
      position: relative;
    }

    .header h1 {
      font-size: 2.2rem;
      font-weight: 800;
      color: #FFFFFF;
      letter-spacing: -0.5px;
      line-height: 1;
    }

    .header .tagline {
      margin-top: 6px;
      font-size: 0.85rem;
      font-weight: 500;
      color: rgba(255,255,255,0.85);
      letter-spacing: 0.6px;
      text-transform: uppercase;
    }

    .header .sub-tagline {
      margin-top: 3px;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.7);
      font-style: italic;
    }

    /* ---------- Main content area ---------- */
    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 20px 16px 40px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ---------- Priority section ---------- */
    /* Each colored band groups cards by urgency level */
    .section {
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      font-weight: 700;
      font-size: 0.82rem;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: #FFFFFF;
    }

    .section-header .label { display: flex; align-items: center; gap: 7px; }

    /* Done-count badge shown when items are completed */
    .done-count {
      font-size: 0.72rem;
      font-weight: 600;
      background: rgba(255,255,255,0.25);
      padding: 2px 8px;
      border-radius: 20px;
      white-space: nowrap;
      opacity: 0;          /* hidden until at least 1 item is done */
      transition: opacity 0.2s;
    }
    .done-count.visible { opacity: 1; }

    /* Accent colours per priority level */
    .section--now   .section-header { background: #E63946; }
    .section--today .section-header { background: #F4A022; }
    .section--wait  .section-header { background: #2A9D5C; }

    /* Left border stripe on cards mirrors the section accent */
    .section--now   .card { border-left: 4px solid #E63946; }
    .section--today .card { border-left: 4px solid #F4A022; }
    .section--wait  .card { border-left: 4px solid #2A9D5C; }

    /* ---------- Message card ---------- */
    /* White card with subtle shadow; sits inside a section */
    .card {
      background: #FFFFFF;
      padding: 14px 14px 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: background 0.25s, opacity 0.25s;
    }

    /* Thin divider between sibling cards */
    .card + .card { border-top: 1px solid #F0F0F0; }

    /* ---- Card content (left side) ---- */
    .card-content { flex: 1; min-width: 0; }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 3px;
    }

    .sender {
      font-weight: 700;
      font-size: 0.88rem;
      color: #1A1A2E;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color 0.25s;
    }

    /* Source-type pill: Email / Slack / Text */
    .tag {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.4px;
      padding: 2px 7px;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .tag--email { background: #E8F4FD; color: #1A6FA3; }
    .tag--text  { background: #FFF0F3; color: #C0392B; }
    .tag--slack { background: #F0E6FF; color: #6B21A8; }

    /* Timestamp sits inline after the type tag */
    .timestamp {
      font-size: 0.70rem;
      color: #AAAAAA;
      font-weight: 400;
      flex-shrink: 0;
    }

    .subject {
      font-weight: 600;
      font-size: 0.84rem;
      color: #2D2D3A;
      margin-bottom: 2px;
      transition: color 0.25s;
    }

    .preview {
      font-size: 0.78rem;
      color: #7A7A8C;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color 0.25s;
    }

    /* ---- Done state styles ---- */
    /* Applied via JS when the Done button is clicked */
    .card.done {
      background: #F5F5F5;
      opacity: 0.72;
    }
    .card.done .sender,
    .card.done .subject { text-decoration: line-through; color: #AAAAAA; }
    .card.done .preview { color: #BBBBBB; }

    /* ---- Done / Undo button (right side) ---- */
    .btn-done {
      flex-shrink: 0;
      padding: 6px 12px;
      font-size: 0.75rem;
      font-weight: 700;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }
    .btn-done:active { transform: scale(0.95); }

    /* Green Done button */
    .btn-done.state-done {
      background: #2A9D5C;
      color: #FFFFFF;
    }
    .btn-done.state-done:hover { background: #228B4F; }

    /* Grey Undo button */
    .btn-done.state-undo {
      background: #D0D0D0;
      color: #555555;
    }
    .btn-done.state-undo:hover { background: #BBBBBB; }

    /* ---------- Gmail connect banner ---------- */
    .gmail-banner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: 16px 0 4px;
      padding: 14px 20px;
      background: rgba(255,255,255,0.15);
      border-radius: 12px;
      flex-wrap: wrap;
    }
    .gmail-banner p {
      color: rgba(255,255,255,0.92);
      font-size: 0.84rem;
      text-align: center;
    }
    .btn-gmail {
      padding: 8px 18px;
      font-size: 0.82rem;
      font-weight: 700;
      border: 2px solid #fff;
      border-radius: 20px;
      background: transparent;
      color: #fff;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, color 0.2s;
      white-space: nowrap;
    }
    .btn-gmail:hover { background: #fff; color: #FF6B35; }
    .btn-gmail.connected {
      background: rgba(255,255,255,0.2);
      font-size: 0.75rem;
      border-color: rgba(255,255,255,0.5);
    }
    .btn-gmail.connected:hover { background: rgba(255,255,255,0.35); color: #fff; }

    /* ---------- Last-analyzed timestamp ---------- */
    .last-analyzed {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.55);
      margin-top: 5px;
      font-style: italic;
      min-height: 1em;
      letter-spacing: 0.2px;
    }

    /* ---------- Meetings section ---------- */
    .meetings-wrap {
      max-width: 680px;
      margin: 20px auto 0;
      padding: 0 16px;
    }

    .meetings-section {
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }

    .meetings-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: #FF6B35;
      font-weight: 700;
      font-size: 0.82rem;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: #fff;
    }

    .meetings-count {
      font-size: 0.72rem;
      font-weight: 600;
      background: rgba(255,255,255,0.25);
      padding: 2px 8px;
      border-radius: 20px;
    }

    .meeting-card {
      background: #fff;
      padding: 13px 14px 13px 16px;
      border-left: 4px solid #3B82F6;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .meeting-card + .meeting-card { border-top: 1px solid #F0F0F0; }

    .meeting-title {
      font-weight: 700;
      font-size: 0.88rem;
      color: #1A1A2E;
    }

    .meeting-time {
      font-size: 0.78rem;
      color: #555;
      font-weight: 500;
    }

    .meeting-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 2px;
    }

    .meeting-attendees {
      font-size: 0.72rem;
      color: #7A7A8C;
    }

    .badge-prep {
      font-size: 0.68rem;
      font-weight: 700;
      background: #FEF3C7;
      color: #92400E;
      border: 1px solid #FDE68A;
      padding: 2px 8px;
      border-radius: 20px;
    }

    .badge-no-agenda {
      font-size: 0.68rem;
      font-weight: 600;
      color: #9CA3AF;
    }

    .meetings-empty {
      background: #fff;
      padding: 18px 16px;
      font-size: 0.84rem;
      color: #2A9D5C;
      font-weight: 600;
      text-align: center;
    }

    /* ---------- Rules button in header ---------- */
    .btn-rules {
      position: absolute;
      top: 16px;
      right: 16px;
      padding: 6px 13px;
      font-size: 0.88rem;
      font-weight: 700;
      letter-spacing: 0.3px;
      background: rgba(255,255,255,0.18);
      border: 1.5px solid rgba(255,255,255,0.55);
      border-radius: 20px;
      color: #fff;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .btn-rules:hover { background: rgba(255,255,255,0.32); }
    /* Glows slightly when custom rules are active */
    .btn-rules.has-rules {
      background: rgba(255,255,255,0.28);
      border-color: #fff;
    }

    /* ---------- Rules overlay ---------- */
    .rules-overlay {
      position: fixed;
      inset: 0;
      background: rgba(26,26,46,0.42);
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    .rules-overlay.open { opacity: 1; pointer-events: all; }

    /* ---------- Rules slide-out panel ---------- */
    .rules-panel {
      position: fixed;
      top: 0;
      right: 0;
      height: 100%;
      width: min(400px, 100vw);
      background: #fff;
      box-shadow: -6px 0 28px rgba(0,0,0,0.14);
      z-index: 201;
      transform: translateX(100%);
      transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
      display: flex;
      flex-direction: column;
    }
    .rules-panel.open { transform: translateX(0); }

    .rules-panel-head {
      background: #FF6B35;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .rules-panel-head h2 {
      color: #fff;
      font-size: 1.05rem;
      font-weight: 800;
      margin: 0;
    }
    .btn-panel-close {
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.2);
      border: none;
      border-radius: 50%;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    .btn-panel-close:hover { background: rgba(255,255,255,0.35); }

    .rules-panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .rules-hint {
      font-size: 0.80rem;
      color: #7A7A8C;
      line-height: 1.55;
      margin: 0;
    }

    .rules-textarea {
      width: 100%;
      min-height: 210px;
      padding: 12px 14px;
      font-size: 0.84rem;
      font-family: inherit;
      color: #1A1A2E;
      border: 1.5px solid #E0E0EC;
      border-radius: 10px;
      resize: vertical;
      line-height: 1.65;
      outline: none;
      transition: border-color 0.2s;
      box-sizing: border-box;
    }
    .rules-textarea:focus { border-color: #FF6B35; }
    .rules-textarea::placeholder { color: #C0C0D0; font-style: italic; }

    .rules-panel-foot {
      padding: 14px 20px;
      border-top: 1px solid #F0F0F0;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex-shrink: 0;
    }
    .rules-foot-btns { display: flex; gap: 10px; }

    .btn-save-rules {
      flex: 1;
      padding: 10px 0;
      background: #2A9D5C;
      color: #fff;
      border: none;
      border-radius: 20px;
      font-size: 0.84rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-save-rules:hover  { background: #228B4F; }
    .btn-save-rules:active { transform: scale(0.97); }
    .btn-save-rules:disabled { background: #A0C4B0; cursor: default; transform: none; }

    .btn-cancel-rules {
      padding: 10px 18px;
      background: #F0F0F4;
      color: #555;
      border: none;
      border-radius: 20px;
      font-size: 0.84rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-cancel-rules:hover { background: #E4E4EC; }

    .rules-saved-msg {
      font-size: 0.80rem;
      font-weight: 600;
      color: #2A9D5C;
      text-align: center;
      min-height: 1.2em;
    }

    /* ---------- Responsive tweak ---------- */
    @media (max-width: 420px) {
      .header h1     { font-size: 1.8rem; }
      .card          { padding: 12px 10px 12px 14px; gap: 8px; }
      .btn-done      { padding: 5px 10px; font-size: 0.70rem; }
    }
  </style>
</head>

<body>

  <!-- ═══════════════════════════════════════════
       HEADER
       Brand bar at the top of every screen.
       Displays the app name and dual tagline.
  ════════════════════════════════════════════ -->
  <header class="header">
    <h1>What Nxt</h1>
    <p class="tagline">Noise vs Signal</p>
    <p class="sub-tagline">You Decide What Matters</p>
    <p id="last-analyzed" class="last-analyzed"></p>

    <!-- Shown/hidden by JS based on /auth/status -->
    <div class="gmail-banner" id="gmail-banner" style="display:none">
      <p id="gmail-banner-text">Connect your Gmail to see your real inbox.</p>
      <a href="/auth/login" class="btn-gmail" id="gmail-btn">Connect Gmail</a>
    </div>

    <button class="btn-rules" id="btn-rules" onclick="openRulesPanel()">⚙️ My Rules</button>
  </header>

  <!-- ═══════════════════════════════════════════
       PRIORITY DASHBOARD
       Three stacked sections rendered by the JS
       buildSection() helper below.
  ════════════════════════════════════════════ -->
  <div class="meetings-wrap" id="meetings-wrap"></div>

  <main class="container" id="dashboard"></main>

  <!-- Rules overlay + slide-out panel -->
  <div class="rules-overlay" id="rules-overlay" onclick="closeRulesPanel()"></div>
  <div class="rules-panel" id="rules-panel" role="dialog" aria-label="Your Priority Rules">
    <div class="rules-panel-head">
      <h2>Your Priority Rules</h2>
      <button class="btn-panel-close" onclick="closeRulesPanel()" aria-label="Close">✕</button>
    </div>
    <div class="rules-panel-body">
      <p class="rules-hint">Write one rule per line in plain English. Your rules work alongside the built-in priority logic and override it when they conflict.</p>
      <textarea class="rules-textarea" id="rules-textarea"
        placeholder="Anything from my kid's school = always DO NOW&#10;Kohl's 30% off = DO TODAY&#10;HOA emails = always CAN WAIT"></textarea>
    </div>
    <div class="rules-panel-foot">
      <div class="rules-foot-btns">
        <button class="btn-save-rules" id="btn-save-rules" onclick="saveRules()">Save Rules</button>
        <button class="btn-cancel-rules" onclick="closeRulesPanel()">Close</button>
      </div>
      <div class="rules-saved-msg" id="rules-saved-msg"></div>
    </div>
  </div>


  <!-- ═══════════════════════════════════════════
       JAVASCRIPT
       ─────────────────────────────────────────
       BUCKET_META: static display config (emoji,
         label, CSS id) for each priority level.

       loadMessages(): fetches messages.json, groups
         the array by priority field, then calls
         buildSection() for each bucket in order.
         Shows a spinner while waiting and an error
         banner if the fetch fails.

       buildSection(): unchanged from Phase 1 —
         creates the section header + cards and
         injects them into #dashboard.

       toggleDone() / refreshCount(): unchanged —
         handle Done ↔ Undo and the item counter.
  ════════════════════════════════════════════ -->
  <script>
    /* ── CALENDAR / MEETINGS ───────────────── */
    async function loadCalendar() {
      const wrap = document.getElementById('meetings-wrap');
      try {
        const res = await fetch('/api/calendar');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const events = await res.json();
        if (events.error) throw new Error(events.error);
        buildMeetingsSection(events, wrap);
      } catch {
        wrap.innerHTML = '';   /* not connected or no calendar access — hide silently */
      }
    }

    function buildMeetingsSection(events, wrap) {
      const safe = str => String(str).replace(/[&<>"']/g, c =>
        ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c])
      );

      const section = document.createElement('div');
      section.className = 'meetings-section';

      const count = events.length;
      section.innerHTML = `
        <div class="meetings-header">
          <span>📅 Today's Meetings</span>
          ${count > 0 ? `<span class="meetings-count">${count} meeting${count !== 1 ? 's' : ''}</span>` : ''}
        </div>
      `;

      if (count === 0) {
        const empty = document.createElement('div');
        empty.className = 'meetings-empty';
        empty.textContent = '✅ No meetings today — focus time!';
        section.appendChild(empty);
      } else {
        events.forEach(ev => {
          const attendeeText = ev.attendees === 0
            ? 'No attendees listed'
            : `👥 ${ev.attendees} attendee${ev.attendees !== 1 ? 's' : ''}`;

          const card = document.createElement('div');
          card.className = 'meeting-card';
          card.innerHTML = `
            <div class="meeting-title">${safe(ev.title)}</div>
            <div class="meeting-time">${safe(ev.startTime)} – ${safe(ev.endTime)}</div>
            <div class="meeting-meta">
              <span class="meeting-attendees">${attendeeText}</span>
              ${ev.prepNeeded       ? '<span class="badge-prep">🕐 Prep needed</span>'   : ''}
              ${!ev.hasDescription  ? '<span class="badge-no-agenda">⚠️ No agenda set</span>' : ''}
            </div>
          `;
          section.appendChild(card);
        });
      }

      wrap.innerHTML = '';
      wrap.appendChild(section);
    }

    /* ── CUSTOM RULES ──────────────────────── */
    let customRules = localStorage.getItem('whatnxt_rules') || '';

    function updateRulesBtn() {
      const btn = document.getElementById('btn-rules');
      if (!btn) return;
      btn.classList.toggle('has-rules', !!customRules.trim());
      btn.title = customRules.trim()
        ? 'Custom rules active — click to edit'
        : 'Add your own priority rules';
    }

    function openRulesPanel() {
      document.getElementById('rules-textarea').value = customRules;
      document.getElementById('rules-saved-msg').textContent = '';
      document.getElementById('btn-save-rules').disabled = false;
      document.getElementById('rules-panel').classList.add('open');
      document.getElementById('rules-overlay').classList.add('open');
      setTimeout(() => document.getElementById('rules-textarea').focus(), 280);
    }

    function closeRulesPanel() {
      document.getElementById('rules-panel').classList.remove('open');
      document.getElementById('rules-overlay').classList.remove('open');
    }

    function saveRules() {
      customRules = document.getElementById('rules-textarea').value.trim();
      localStorage.setItem('whatnxt_rules', customRules);
      localStorage.removeItem('whatnxt_score_cache');   /* new rules → re-score everything */
      updateRulesBtn();
      const saveBtn = document.getElementById('btn-save-rules');
      const msg = document.getElementById('rules-saved-msg');
      saveBtn.disabled = true;
      msg.textContent = '✅ Rules saved! Refreshing…';
      setTimeout(() => {
        closeRulesPanel();
        saveBtn.disabled = false;
        msg.textContent = '';
        loadMessages();
      }, 1200);
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeRulesPanel();
    });

    /* ── BUCKET META ────────────────────────── */
    /*
      Display config for the three priority levels.
      The `key` matches the `priority` field in
      messages.json so we can group messages into
      the right bucket without any extra mapping.
    */
    const BUCKETS = [
      { key: "do-now",    id: "now",   emoji: "🔴", label: "Do Now"   },
      { key: "do-today",  id: "today", emoji: "🟡", label: "Do Today" },
      { key: "can-wait",  id: "wait",  emoji: "🟢", label: "Can Wait" }
    ];

    /* ── SPINNER HELPERS ────────────────────── */
    /*
      showSpinner() injects a centred animated ring
      into #dashboard while the fetch is in flight.
      hideSpinner() removes it before rendering cards.
    */
    function showSpinner() {
      document.getElementById("dashboard").innerHTML = `
        <div id="spinner" style="
          display:flex; flex-direction:column;
          align-items:center; justify-content:center;
          padding: 60px 20px; gap: 14px;
        ">
          <div style="
            width:40px; height:40px;
            border:4px solid #FFD6C2;
            border-top-color:#FF6B35;
            border-radius:50%;
            animation: spin 0.8s linear infinite;
          "></div>
          <span style="font-size:0.85rem; color:#999;">Loading your messages…</span>
        </div>
        <style>
          @keyframes spin { to { transform: rotate(360deg); } }
        </style>
      `;
    }

    function hideSpinner() {
      const el = document.getElementById("spinner");
      if (el) el.parentElement.innerHTML = "";
    }

    /* ── ERROR BANNER ───────────────────────── */
    /*
      Shown if fetch() fails (e.g. file not found,
      network error). Gives the user a clear message
      instead of a silent blank screen.
    */
    function showError(msg) {
      document.getElementById("dashboard").innerHTML = `
        <div style="
          background:#FFF0F0; border:1px solid #FFCCCC;
          border-radius:12px; padding:24px 20px;
          text-align:center; color:#C0392B;
          font-size:0.88rem; line-height:1.5;
        ">
          <div style="font-size:1.6rem; margin-bottom:8px;">⚠️</div>
          <strong>Could not load messages</strong><br/>
          ${msg}
        </div>
      `;
    }

    /* ── LAST ANALYZED TIMESTAMP ───────────── */
    function updateLastAnalyzed() {
      const el = document.getElementById('last-analyzed');
      if (!el) return;
      const ts = localStorage.getItem('whatnxt_last_analyzed');
      if (!ts) { el.textContent = ''; return; }
      const mins = Math.floor((Date.now() - Number(ts)) / 60000);
      if (mins < 1)       el.textContent = 'Last analyzed: just now';
      else if (mins < 60) el.textContent = `Last analyzed: ${mins} min${mins !== 1 ? 's' : ''} ago`;
      else {
        const hrs = Math.floor(mins / 60);
        el.textContent = `Last analyzed: ${hrs} hour${hrs !== 1 ? 's' : ''} ago`;
      }
    }

    /* ── LOAD MESSAGES ──────────────────────── */
    async function loadMessages() {
      showSpinner();

      /* Score cache: { [gmailId]: { priority, cachedAt } } */
      const cache     = JSON.parse(localStorage.getItem('whatnxt_score_cache') || '{}');
      const cachedIds = Object.keys(cache);

      let messages;
      try {
        const params = new URLSearchParams();
        if (customRules)      params.set('rules',  customRules);
        if (cachedIds.length) params.set('cached', cachedIds.join(','));
        const qs  = params.toString() ? `?${params.toString()}` : '';
        const res = await fetch(`/api/messages${qs}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        messages = await res.json();
      } catch (err) {
        hideSpinner();
        showError(`${err.message}. Make sure the server is running: <code>node server.js</code>`);
        return;
      }

      /* Merge fresh scores + cached scores; persist any new scores */
      const newCache = { ...cache };
      messages = messages.map(msg => {
        if (msg.priority === null && msg.gmailId && cache[msg.gmailId]) {
          /* Server skipped this one — fill in from localStorage */
          return { ...msg, priority: cache[msg.gmailId].priority };
        }
        if (msg.priority !== null && msg.gmailId) {
          /* Fresh Claude score — save it for next load */
          newCache[msg.gmailId] = { priority: msg.priority, cachedAt: Date.now() };
        }
        return msg;
      });
      localStorage.setItem('whatnxt_score_cache',   JSON.stringify(newCache));
      localStorage.setItem('whatnxt_last_analyzed', String(Date.now()));
      updateLastAnalyzed();

      hideSpinner();

      /* Group flat array → { "do-now": [...], "do-today": [...], ... } */
      const grouped = {};
      messages.forEach(msg => {
        if (!grouped[msg.priority]) grouped[msg.priority] = [];
        grouped[msg.priority].push(msg);
      });

      /* Render sections in fixed order (Now → Today → Wait) */
      BUCKETS.forEach(bucket => {
        buildSection({
          id:       bucket.id,
          emoji:    bucket.emoji,
          label:    bucket.label,
          messages: grouped[bucket.key] || []   /* empty array = section still renders */
        });
      });
    }

    /* ── BUILD SECTION ──────────────────────── */
    /*
      Unchanged from Phase 1.
      Creates one priority band (header + cards) and
      appends it to #dashboard.
      Now also shows the message timestamp alongside
      the source-type tag.
    */
    function buildSection({ id, emoji, label, messages }) {
      const section = document.createElement("section");
      section.className = `section section--${id}`;
      section.dataset.id = id;

      const header = document.createElement("div");
      header.className = "section-header";
      header.innerHTML = `
        <span class="label">
          <span>${emoji}</span>
          <span>${label}</span>
        </span>
        <span class="done-count" id="count-${id}"></span>
      `;
      section.appendChild(header);

      messages.forEach((msg, index) => {
        const card = document.createElement("div");
        card.className = "card";
        card.dataset.section = id;
        card.dataset.index   = index;

        /* Safely escape user-supplied strings to prevent XSS */
        const safe = str => str.replace(/[&<>"']/g, c => ({
          "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
        }[c]));

        const typeLabel = msg.type.charAt(0).toUpperCase() + msg.type.slice(1);

        card.innerHTML = `
          <div class="card-content">
            <div class="card-meta">
              <span class="sender">${safe(msg.sender)}</span>
              <span class="tag tag--${safe(msg.type)}">${safe(typeLabel)}</span>
              <span class="timestamp">${safe(msg.timestamp)}</span>
            </div>
            <div class="subject">${safe(msg.subject)}</div>
            <div class="preview">${safe(msg.preview)}</div>
          </div>
          <button
            class="btn-done state-done"
            onclick="toggleDone(this)"
            aria-label="Mark as done"
          >✅ Done</button>
        `;

        section.appendChild(card);
      });

      document.getElementById("dashboard").appendChild(section);
    }

    /* ── TOGGLE DONE ────────────────────────── */
    /* Unchanged from Phase 1 */
    function toggleDone(btn) {
      const card      = btn.closest(".card");
      const sectionId = card.dataset.section;
      const isDone    = card.classList.toggle("done");

      if (isDone) {
        btn.textContent = "↩ Undo";
        btn.classList.replace("state-done", "state-undo");
        btn.setAttribute("aria-label", "Undo — mark as not done");
      } else {
        btn.textContent = "✅ Done";
        btn.classList.replace("state-undo", "state-done");
        btn.setAttribute("aria-label", "Mark as done");
      }

      refreshCount(sectionId);
    }

    /* ── REFRESH COUNT ──────────────────────── */
    /* Unchanged from Phase 1 */
    function refreshCount(sectionId) {
      const section = document.querySelector(`.section--${sectionId}`);
      const total   = section.querySelectorAll(".card.done").length;
      const badge   = document.getElementById(`count-${sectionId}`);

      badge.textContent = `${total} item${total !== 1 ? "s" : ""} done`;
      badge.classList.toggle("visible", total > 0);
    }

    /* ── GMAIL BANNER ──────────────────────── */
    /*
      Checks /auth/status on load.
      - Not connected: shows the banner with a "Connect Gmail" link.
      - Connected:     shows a small "Gmail connected · Disconnect" badge
                       so the user knows where their data is coming from.
      In both cases loadMessages() runs immediately — connected = real Gmail,
      disconnected = local messages.json fallback.
    */
    async function initAuthBanner() {
      try {
        const res  = await fetch('/auth/status');
        const data = await res.json();
        const banner = document.getElementById('gmail-banner');
        const text   = document.getElementById('gmail-banner-text');
        const btn    = document.getElementById('gmail-btn');

        banner.style.display = 'flex';

        if (data.connected) {
          text.textContent = 'Gmail connected — showing your real inbox.';
          btn.textContent  = 'Disconnect';
          btn.href         = '/auth/logout';
          btn.classList.add('connected');
        } else {
          text.textContent = 'Connect your Gmail to see your real inbox.';
          btn.textContent  = 'Connect Gmail';
          btn.href         = '/auth/login';
          btn.classList.remove('connected');
        }
      } catch {
        /* If the server isn't running yet, silently skip the banner */
      }
    }

    /* ── INIT ───────────────────────────────── */
    /* Kick off the fetch as soon as the page loads */
    updateRulesBtn();
    updateLastAnalyzed();
    initAuthBanner();
    loadCalendar();
    loadMessages();
  </script>

</body>
</html>
